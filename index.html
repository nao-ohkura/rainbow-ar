<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>リアルタイムWebAR 虹・月虹プロトタイプ (方位補正版)</title>
  
  <!-- A-FrameとAR.jsの読み込み -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <!-- SunCalcの読み込み (太陽・月の位置計算用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

  <style>
    /* UIメッセージ用スタイル */
    #ui-container {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: 90%;
      text-align: center;
      font-family: sans-serif;
    }
    #message {
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 16px;
      line-height: 1.5;
      cursor: pointer;
    }
    /* デバッグ情報用スタイル */
    #debug-info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.6);
      color: #0f0;
      padding: 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.4;
      z-index: 1000;
      pointer-events: none;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

  <!-- メッセージ表示用UI (iOSのセンサ許可のためのタップ領域兼用) -->
  <div id="ui-container">
    <div id="message">画面をタップしてセンサーを許可し<br>位置情報を取得してください</div>
  </div>

  <!-- デバッグ表示用UI -->
  <div id="debug-info">デバッグ待機中...</div>

  <!-- A-Frameシーン -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <!-- 虹・月虹を格納するコンテナ -->
    <a-entity id="rainbow-container" visible="false">
      <!-- カメラ正面(Z=-10)を基準とする -->
      <a-entity position="0 0 -10">
        <a-torus class="rainbow-ring" radius="9.6" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
        <a-torus class="rainbow-ring" radius="9.4" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
        <a-torus class="rainbow-ring" radius="9.2" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
        <a-torus class="rainbow-ring" radius="9.0" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
        <a-torus class="rainbow-ring" radius="8.8" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
        <a-torus class="rainbow-ring" radius="8.6" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
        <a-torus class="rainbow-ring" radius="8.4" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
      </a-entity>
    </a-entity>

    <!-- カメラ（look-controlsでジャイロを使った視点移動が可能） -->
    <a-camera position="0 1.6 0" look-controls></a-camera>

  </a-scene>

  <!-- 天体計算・位置情報・UI制御・コンパス補正のスクリプト -->
  <script>
    window.onload = () => {
      const messageEl = document.getElementById('message');
      const debugEl = document.getElementById('debug-info');
      const rainbowContainer = document.getElementById('rainbow-container');
      const rings = document.querySelectorAll('.rainbow-ring');
      
      const colorsSun = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#9400D3'];
      const colorsMoon = ['#ffcccc', '#ffe6cc', '#ffffcc', '#ccffcc', '#ccccff', '#e6ccff', '#ffccff']; 

      // デバイスの方位情報（コンパス）
      let initialHeading = 0;
      let currentHeading = 0;
      let hasHeading = false;
      
      // GPS情報
      let userLat = 0;
      let userLng = 0;
      let hasLocation = false;

      // SunCalcのazimuth(南基準ラジアン)を真北基準(0〜359度の時計回り)に変換する関数
      const formatAzimuth = (rad) => {
        return ((rad * 180 / Math.PI) + 180 + 360) % 360;
      };

      // デバイスの向き情報取得（コンパス）
      window.addEventListener('deviceorientation', (e) => {
        let heading = null;
        if (e.webkitCompassHeading !== undefined) {
          heading = e.webkitCompassHeading; // iOS用 真北基準
        } else if (e.absolute === true && e.alpha !== null) {
          heading = 360 - e.alpha; // Android向け（簡易方位）
        }

        if (heading !== null) {
          currentHeading = heading;
          if (!hasHeading) {
            initialHeading = heading; // AR起動時に端末が向いていた絶対方角をオフセットとして記録
            hasHeading = true;
            if (hasLocation) updateRainbow(); // 位置情報があれば即再計算
          }
          updateDebugText(); // 常にデバッグ情報を更新
        }
      });

      // iOS13以降のセンサー許可ダイアログ対応
      let permissionRequested = false;
      document.body.addEventListener('click', () => {
        if (permissionRequested) return;
        permissionRequested = true;
        
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission().catch(console.error);
        }

        startLocationTracking();
      });

      // 天体計算と虹の配置を実行
      const updateRainbow = () => {
        if (!hasLocation) return;
        
        const now = new Date();
        const sunPos = SunCalc.getPosition(now, userLat, userLng);
        const moonPos = SunCalc.getMoonPosition(now, userLat, userLng);
        
        // --- 太陽と月の高度（度数法） ---
        const sunAltitudeDeg = sunPos.altitude * 180 / Math.PI;
        const moonAltitudeDeg = moonPos.altitude * 180 / Math.PI;
        
        // --- 方位の変換 (SunCalcの南基準ラジアン → 北基準・度数法) ---
        const sunAzimuthDeg = formatAzimuth(sunPos.azimuth);
        const moonAzimuthDeg = formatAzimuth(moonPos.azimuth);

        let targetAzimuthDeg = 0;
        let targetAltitudeDeg = 0;
        let mode = 'none';

        if (sunAltitudeDeg > 0) {
          mode = 'sun';
        } else if (sunAltitudeDeg <= 0 && moonAltitudeDeg > 0) {
          mode = 'moon';
        }

        if (mode === 'sun') {
          rings.forEach((ring, i) => ring.setAttribute('color', colorsSun[i]));
          
          if (sunAltitudeDeg >= 42) {
            messageEl.innerHTML = `【太陽の虹を予測中】<br>太陽高度: ${sunAltitudeDeg.toFixed(1)}°<br>虹は地平線の下です`;
            rainbowContainer.setAttribute('visible', 'false');
          } else {
            messageEl.innerHTML = `【太陽の虹を予測中】<br>太陽高度: ${sunAltitudeDeg.toFixed(1)}°<br>見回して反対側を探してください`;
            rainbowContainer.setAttribute('visible', 'true');
            
            // 虹の中心座標（太陽の方位 + 180度, 高度の符号反転）
            targetAzimuthDeg = (sunAzimuthDeg + 180) % 360;
            targetAltitudeDeg = -sunAltitudeDeg;
          }

        } else if (mode === 'moon') {
          rings.forEach((ring, i) => ring.setAttribute('color', colorsMoon[i]));
          
          if (moonAltitudeDeg >= 42) {
            messageEl.innerHTML = `【月の虹を予測中】<br>月高度: ${moonAltitudeDeg.toFixed(1)}°<br>月虹は地平線の下です`;
            rainbowContainer.setAttribute('visible', 'false');
          } else {
            messageEl.innerHTML = `【月の虹を予測中】<br>月高度: ${moonAltitudeDeg.toFixed(1)}°<br>見回して月虹を探してください`;
            rainbowContainer.setAttribute('visible', 'true');
            
            // 虹の中心座標（月の方位 + 180度, 高度の符号反転）
            targetAzimuthDeg = (moonAzimuthDeg + 180) % 360;
            targetAltitudeDeg = -moonAltitudeDeg;
          }

        } else {
           messageEl.innerHTML = `天体が地平線の下です<br>虹は見えません`;
           rainbowContainer.setAttribute('visible', 'false');
        }

        // --- A-Frameの回転を適用 ---
        // A-Frameでは Y軸反時計回りが正。
        // 北基準の方位角をA-Frameに合わせるための計算: (初期コンパス向いている方向 - 目的の方位)
        const rotationY = hasHeading ? (initialHeading - targetAzimuthDeg) : (-targetAzimuthDeg);
        const rotationX = targetAltitudeDeg; // X軸は高度
        
        rainbowContainer.setAttribute('rotation', `${rotationX} ${rotationY} 0`);

        // デバッグ変数に保存しておく
        window.__debugInfo = {
          sunAzRad: sunAzimuthDeg, sunAltRad: sunAltitudeDeg,
          rainAzRad: targetAzimuthDeg, rainAltRad: targetAltitudeDeg
        };
        
        updateDebugText();
      };

      // デバッグ情報テキストの更新
      const updateDebugText = () => {
        if(!window.__debugInfo) return;
        const d = window.__debugInfo;
        debugEl.innerHTML = `
          太陽位置: 🧭方位 ${d.sunAzRad.toFixed(1)}° / ↕️高度 ${d.sunAltRad.toFixed(1)}°<br>
          虹の座標: 🎯方位 ${d.rainAzRad.toFixed(1)}° / ↕️高度 ${d.rainAltRad.toFixed(1)}°<br>
          コンパス: 補正基準 ${hasHeading ? initialHeading.toFixed(1) + '°' : '未取得'} / 現在 ${currentHeading.toFixed(1)}°
        `;
      };

      // GPSのトラッキング開始
      const startLocationTracking = () => {
        if (!navigator.geolocation) {
          messageEl.innerText = "位置情報がサポートされていません。";
          return;
        }

        messageEl.innerText = "現在地を取得しています...";

        navigator.geolocation.getCurrentPosition(
          (position) => {
            userLat = position.coords.latitude;
            userLng = position.coords.longitude;
            hasLocation = true;
            
            updateRainbow();
            setInterval(updateRainbow, 30000); // 30秒ごとに更新
          },
          (error) => {
            messageEl.innerText = "位置情報の取得失敗: " + error.message;
          },
          { enableHighAccuracy: true }
        );
      };
    };
  </script>
</body>
</html>
