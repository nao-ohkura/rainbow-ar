<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>リアルタイムWebAR 虹・月虹プロトタイプ</title>
  
  <!-- A-FrameとAR.jsの読み込み -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <!-- SunCalcの読み込み (太陽・月の位置計算用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

  <style>
    /* UIメッセージ用スタイル */
    #ui-container {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: 90%;
      text-align: center;
      font-family: sans-serif;
    }
    #message {
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

  <!-- メッセージ表示用UI -->
  <div id="ui-container">
    <div id="message">位置情報と天体の計算を準備中...</div>
  </div>

  <!-- A-Frameシーン -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <!-- 虹・月虹を格納するコンテナ -->
    <a-entity id="rainbow-container" visible="false">
      <!-- カメラから距離10の位置に配置 -->
      <a-entity position="0 0 -10">
        <!-- class="rainbow-ring" を付けて JS から色を一括変更できるようにする -->
        <a-torus class="rainbow-ring" radius="9.6" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
        <a-torus class="rainbow-ring" radius="9.4" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
        <a-torus class="rainbow-ring" radius="9.2" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
        <a-torus class="rainbow-ring" radius="9.0" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
        <a-torus class="rainbow-ring" radius="8.8" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
        <a-torus class="rainbow-ring" radius="8.6" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
        <a-torus class="rainbow-ring" radius="8.4" radius-tubular="0.1" arc="180" material="opacity: 0.6; transparent: true"></a-torus>
      </a-entity>
    </a-entity>

    <!-- カメラ（look-controlsでジャイロを使った視点移動が可能） -->
    <a-camera position="0 1.6 0" look-controls></a-camera>

  </a-scene>

  <!-- 天体計算・位置情報・UI制御のスクリプト -->
  <script>
    window.onload = () => {
      const messageEl = document.getElementById('message');
      const rainbowContainer = document.getElementById('rainbow-container');
      const rings = document.querySelectorAll('.rainbow-ring');
      
      // 通常の虹の色 (外側から内側へ: 赤〜紫)
      const colorsSun = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#9400D3'];
      // 月虹の色 (淡く白っぽいセレニティ・パステルカラー)
      const colorsMoon = ['#ffcccc', '#ffe6cc', '#ffffcc', '#ccffcc', '#ccccff', '#e6ccff', '#ffccff']; 

      if (!navigator.geolocation) {
        messageEl.innerText = "このブラウザでは位置情報がサポートされていません。";
        return;
      }

      messageEl.innerText = "現在地を取得しています...";

      // 現在地の取得
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          
          const updateRainbow = () => {
            const now = new Date();
            
            // SunCalcで現在日時の太陽と月の位置を取得
            const sunPos = SunCalc.getPosition(now, lat, lng);
            const moonPos = SunCalc.getMoonPosition(now, lat, lng);
            
            // ラジアンから度(degree)へ変換
            const sunAzimuthDeg = sunPos.azimuth * 180 / Math.PI;
            const sunAltitudeDeg = sunPos.altitude * 180 / Math.PI;
            
            const moonAzimuthDeg = moonPos.azimuth * 180 / Math.PI;
            const moonAltitudeDeg = moonPos.altitude * 180 / Math.PI;

            // 昼か夜（月虹モード）かの判定
            let mode = 'none';
            if (sunAltitudeDeg > 0) {
              mode = 'sun'; // 昼: 太陽の虹モード
            } else if (sunAltitudeDeg <= 0 && moonAltitudeDeg > 0) {
              mode = 'moon'; // 夜: 月虹モード
            }

            if (mode === 'sun') {
              // --- 太陽の虹モード ---
              rings.forEach((ring, i) => ring.setAttribute('color', colorsSun[i]));
              
              if (sunAltitudeDeg >= 42) {
                messageEl.innerHTML = `【太陽の虹を予測中】<br>太陽高度: ${sunAltitudeDeg.toFixed(1)}°<br>虹は地平線の下です`;
                rainbowContainer.setAttribute('visible', 'false');
              } else {
                messageEl.innerHTML = `【太陽の虹を予測中】<br>太陽高度: ${sunAltitudeDeg.toFixed(1)}°<br>見回して、太陽の反対側を探してください`;
                rainbowContainer.setAttribute('visible', 'true');
                rainbowContainer.setAttribute('rotation', `${-sunAltitudeDeg} ${sunAzimuthDeg + 180} 0`);
              }

            } else if (mode === 'moon') {
              // --- 月虹モード ---
              rings.forEach((ring, i) => ring.setAttribute('color', colorsMoon[i]));
              
              if (moonAltitudeDeg >= 42) {
                messageEl.innerHTML = `【月の虹を予測中】<br>月高度: ${moonAltitudeDeg.toFixed(1)}°<br>月虹は地平線の下です`;
                rainbowContainer.setAttribute('visible', 'false');
              } else {
                messageEl.innerHTML = `【月の虹を予測中】<br>月高度: ${moonAltitudeDeg.toFixed(1)}°<br>見回して、月の反対側（月虹）を探してください`;
                rainbowContainer.setAttribute('visible', 'true');
                rainbowContainer.setAttribute('rotation', `${-moonAltitudeDeg} ${moonAzimuthDeg + 180} 0`);
              }

            } else {
               // 太陽も月も出ていない場合
               messageEl.innerHTML = `太陽も月も地平線の下です<br>虹は見えません`;
               rainbowContainer.setAttribute('visible', 'false');
            }
          };

          // 初回実行
          updateRainbow();

          // 1分ごとに天体の動きに合わせて再計算
          setInterval(updateRainbow, 60000);

        },
        (error) => {
          messageEl.innerText = "位置情報の取得に失敗しました: " + error.message;
        },
        { enableHighAccuracy: true }
      );
    };
  </script>
</body>
</html>
