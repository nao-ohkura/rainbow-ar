<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>リアルタイムWebAR 虹プロトタイプ (広角・全体表示版)</title>
  
  <!-- AR.jsがカメラを要求する前にGetUserMediaをフックして広角レンズを狙うハック -->
  <script>
    const origGetUserMedia = navigator.mediaDevices ? navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices) : null;
    if (origGetUserMedia) {
      navigator.mediaDevices.getUserMedia = async (constraints) => {
        if (constraints && constraints.video) {
          // 既存のvideo制約をオブジェクト化
          const videoConstraints = typeof constraints.video === 'object' ? constraints.video : {};
          constraints.video = {
            ...videoConstraints,
            facingMode: 'environment', // 明示的に背面カメラを指定
            // ※Safari (iOS) 向けに広角を要求するヒント (OS依存で確実に効くわけではありませんが、超広角が選ばれやすくなるテクニック)
            zoom: 1.0 
          };
        }
        return origGetUserMedia(constraints);
      };
    }
  </script>

  <!-- A-FrameとAR.jsの読み込み -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <!-- SunCalcの読み込み (太陽の位置計算用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    
    #ui-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1000;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    
    #top-panel {
      background: rgba(0, 0, 0, 0.7); color: #0f0; margin: 10px; padding: 12px;
      border-radius: 8px; pointer-events: auto; font-family: monospace; font-size: 13px;
      line-height: 1.6; text-shadow: 1px 1px 2px #000;
    }

    #status-msg {
      background: rgba(0, 0, 0, 0.8); color: #fff; margin: 10px auto 30px auto; 
      padding: 12px 20px; border-radius: 8px; text-align: center; max-width: 90%;
      font-weight: bold; font-size: 16px;
    }

    #start-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 2000;
      display: flex; justify-content: center; align-items: center; pointer-events: auto;
    }
    button {
      padding: 18px 32px; font-size: 18px; border-radius: 8px; border: none;
      background: #007bff; color: white; cursor: pointer; font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    button:active { background: #0056b3; transform: translateY(2px); }
  </style>
</head>
<body>

  <!-- センサー許可用のスタート画面 -->
  <div id="start-screen">
    <button id="start-btn">ARを開始<br><small>(カメラ・位置情報を許可)</small></button>
  </div>

  <div id="ui-overlay">
    <div id="top-panel">
      <b>[デバッグ情報]</b><br>
      📍 緯度経度 : <span id="dbg-loc">取得中...</span><br>
      🧭 コンパス : <span id="dbg-compass">--</span>° (初期化: <span id="dbg-initial">--</span>°)<br>
      ☀️ 太陽 : 方位 <span id="dbg-sun-az">--</span>° / 高度 <span id="dbg-sun-alt">--</span>°<br>
      🌈 反太陽点 : 方位 <span id="dbg-rb-az">--</span>° / 高度 <span id="dbg-rb-alt">--</span>°
    </div>
    <div id="status-msg">位置情報と太陽の軌道を計算中...</div>
  </div>

  <!-- A-Frameシーン: AR.jsの設定 -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <!-- ====== ワールド空間コンテナ ====== -->
    <a-entity id="world-container">
      
      <!-- 真北（N）と真南（S）のマーカー -->
      <a-entity rotation="0 0 0">
        <a-sphere position="0 0 -5" radius="0.3" color="red" opacity="0.8"></a-sphere>
        <a-text value="N (North)" position="0 0.8 -5" align="center" color="red" scale="1.5 1.5 1.5"></a-text>
      </a-entity>
      <a-entity rotation="0 -180 0">
        <a-sphere position="0 0 -5" radius="0.3" color="royalblue" opacity="0.8"></a-sphere>
        <a-text value="S (South)" position="0 0.8 -5" align="center" color="royalblue" scale="1.5 1.5 1.5"></a-text>
      </a-entity>

      <!-- ====== 虹のコンテナ ====== -->
      <a-entity id="rainbow-pivot" visible="false">
        <!-- Z軸側に遠ざける（-10 → -20）。半径を相対的にやや小さく設計し画面に収まりやすくする -->
        <a-entity position="0 0 -20">
          <a-torus radius="14.8" radius-tubular="0.2" arc="180" color="#FF0000" material="opacity: 0.7; transparent: true"></a-torus>
          <a-torus radius="14.4" radius-tubular="0.2" arc="180" color="#FF7F00" material="opacity: 0.7; transparent: true"></a-torus>
          <a-torus radius="14.0" radius-tubular="0.2" arc="180" color="#FFFF00" material="opacity: 0.7; transparent: true"></a-torus>
          <a-torus radius="13.6" radius-tubular="0.2" arc="180" color="#00FF00" material="opacity: 0.7; transparent: true"></a-torus>
          <a-torus radius="13.2" radius-tubular="0.2" arc="180" color="#0000FF" material="opacity: 0.7; transparent: true"></a-torus>
          <a-torus radius="12.8" radius-tubular="0.2" arc="180" color="#4B0082" material="opacity: 0.7; transparent: true"></a-torus>
          <a-torus radius="12.4" radius-tubular="0.2" arc="180" color="#9400D3" material="opacity: 0.7; transparent: true"></a-torus>
        </a-entity>
      </a-entity>

    </a-entity>

    <!-- カメラ（fov="100"として広角を要求） -->
    <a-camera position="0 1.6 0" fov="100" look-controls></a-camera>

  </a-scene>

  <!-- 制御スクリプト -->
  <script>
    const startBtn = document.getElementById('start-btn');
    const startScreen = document.getElementById('start-screen');
    const dbgLoc = document.getElementById('dbg-loc');
    const dbgCompass = document.getElementById('dbg-compass');
    const dbgInitial = document.getElementById('dbg-initial');
    const dbgSunAz = document.getElementById('dbg-sun-az');
    const dbgSunAlt = document.getElementById('dbg-sun-alt');
    const dbgRbAz = document.getElementById('dbg-rb-az');
    const dbgRbAlt = document.getElementById('dbg-rb-alt');
    const statusMsg = document.getElementById('status-msg');
    
    const worldContainer = document.getElementById('world-container');
    const rainbowPivot = document.getElementById('rainbow-pivot');

    let hasLocation = false;
    let userLat = 0, userLng = 0;
    let hasCompass = false;
    let initialHeading = 0;

    startBtn.addEventListener('click', async () => {
      // iOS13以降のDeviceOrientation許可要求
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== 'granted') {
            alert('センサーへのアクセスが拒否されました。設定を確認してください。');
            return;
          }
        } catch (error) {
          console.error('Permission Error:', error);
        }
      }
      startScreen.style.display = 'none';
      initApp();
    });

    function initApp() {
      // 1. デバイスの方位（コンパス）イベント登録
      // iOS用 (webkitCompassHeading)
      window.addEventListener('deviceorientation', (e) => {
        if (e.webkitCompassHeading !== undefined) {
          handleHeading(e.webkitCompassHeading);
        }
      });
      // Android用 (deviceorientationabsolute)
      window.addEventListener('deviceorientationabsolute', (e) => {
        if (e.alpha !== null) {
          handleHeading(360 - e.alpha);
        }
      });

      function handleHeading(heading) {
        if (heading === null) return;
        dbgCompass.innerText = heading.toFixed(1);
        
        if (!hasCompass) {
          initialHeading = heading;
          dbgInitial.innerText = initialHeading.toFixed(1);
          hasCompass = true;
          
          // ワールドコンテナを初期方位分だけ回転させ、現実の北と一致させる
          worldContainer.setAttribute('rotation', `0 ${initialHeading} 0`);
          if (hasLocation) updateRainbow();
        }
      }

      // 2. 位置情報の取得開始
      if (!navigator.geolocation) {
        statusMsg.innerText = "このブラウザでは位置情報がサポートされていません。";
        return;
      }
      statusMsg.innerText = "現在地を取得しています...";

      navigator.geolocation.getCurrentPosition(
        (position) => {
          userLat = position.coords.latitude;
          userLng = position.coords.longitude;
          hasLocation = true;
          
          dbgLoc.innerText = `${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
          
          updateRainbow();
          setInterval(updateRainbow, 30000); // 30秒ごとに更新
        },
        (error) => {
          statusMsg.innerText = "位置情報の取得に失敗: " + error.message;
        },
        { enableHighAccuracy: true }
      );
    }

    // 3. 太陽・虹の座標を計算・配置する
    function updateRainbow() {
      if (!hasLocation || !hasCompass) return;
      
      const now = new Date();
      const sunPos = SunCalc.getPosition(now, userLat, userLng);
      
      const sunAltitudeDeg = sunPos.altitude * 180 / Math.PI;
      const sunAzimuthDeg = ((sunPos.azimuth * 180 / Math.PI) + 180 + 360) % 360;

      dbgSunAlt.innerText = sunAltitudeDeg.toFixed(1);
      dbgSunAz.innerText = sunAzimuthDeg.toFixed(1);

      // 対日点（虹の中心点）の計算
      const rainbowAzimuthDeg = (sunAzimuthDeg + 180) % 360;
      const rainbowAltitudeDeg = -sunAltitudeDeg;

      dbgRbAlt.innerText = rainbowAltitudeDeg.toFixed(1);
      dbgRbAz.innerText = rainbowAzimuthDeg.toFixed(1);

      if (sunAltitudeDeg >= 42) {
        statusMsg.innerText = "太陽高度が42度以上のため、虹は地平線の下です";
        rainbowPivot.setAttribute('visible', 'false');
      } else if (sunAltitudeDeg < 0) {
        statusMsg.innerText = "日没後のため太陽の虹は見えません（月虹モード未実装）";
        rainbowPivot.setAttribute('visible', 'false');
      } else {
        statusMsg.innerText = "見回して、太陽の反対側のリングを探してください";
        rainbowPivot.setAttribute('visible', 'true');
        
        // 方位を反転（A-FrameのY軸は反時計回りが正のため）
        rainbowPivot.setAttribute('rotation', `${rainbowAltitudeDeg} ${-rainbowAzimuthDeg} 0`);
      }
    }
  </script>
</body>
</html>
