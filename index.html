<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>リアルタイムWebAR 虹プロトタイプ (方位・デバッグ機能付き)</title>
  
  <!-- A-FrameとAR.jsの読み込み -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <!-- SunCalcの読み込み (太陽の位置計算用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    
    /* UIオーバーレイ */
    #ui-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1000;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    
    /* 画面上部のデバッグパネル */
    #top-panel {
      background: rgba(0, 0, 0, 0.7); color: #0f0; margin: 10px; padding: 12px;
      border-radius: 8px; pointer-events: auto; font-family: monospace; font-size: 13px;
      line-height: 1.6; text-shadow: 1px 1px 2px #000;
    }

    /* 画面下部のメインメッセージ */
    #status-msg {
      background: rgba(0, 0, 0, 0.8); color: #fff; margin: 10px auto 30px auto; 
      padding: 12px 20px; border-radius: 8px; text-align: center; max-width: 90%;
      font-weight: bold; font-size: 16px;
    }

    /* 開始画面 (タップによるセンサー許可のため必須) */
    #start-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 2000;
      display: flex; justify-content: center; align-items: center; pointer-events: auto;
    }
    button {
      padding: 18px 32px; font-size: 18px; border-radius: 8px; border: none;
      background: #007bff; color: white; cursor: pointer; font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    button:active { background: #0056b3; transform: translateY(2px); }
  </style>
</head>
<body>

  <!-- センサー許可用のスタート画面 -->
  <div id="start-screen">
    <button id="start-btn">ARを開始<br><small>(カメラ・位置情報・センサーを許可)</small></button>
  </div>

  <!-- デバッグおよびステータス表示UI -->
  <div id="ui-overlay">
    <div id="top-panel">
      <b>[デバッグ情報]</b><br>
      📍 緯度経度 : <span id="dbg-loc">取得中...</span><br>
      🧭 コンパス : <span id="dbg-compass">--</span>° (初期化: <span id="dbg-initial">--</span>°)<br>
      ☀️ 太陽 : 方位 <span id="dbg-sun-az">--</span>° / 高度 <span id="dbg-sun-alt">--</span>°<br>
      🌈 反太陽点 : 方位 <span id="dbg-rb-az">--</span>° / 高度 <span id="dbg-rb-alt">--</span>°
    </div>
    <div id="status-msg">位置情報と太陽の軌道を計算中...</div>
  </div>

  <!-- A-Frameシーン -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <!-- ====== ワールド空間コンテナ ====== -->
    <!-- ここのY軸回転に「デバイス起動時のコンパス方位(initialHeading)」を与えることで、
         ARカメラからの相対的な向きではなく、現実の真北と一致する絶対空間を表現します -->
    <a-entity id="world-container">
      
      <!-- [視覚化用] 真北（North）オブジェクト: 座標系テスト用 -->
      <a-entity rotation="0 0 0">
        <a-sphere position="0 0 -5" radius="0.3" color="red" opacity="0.8"></a-sphere>
        <a-text value="N (North)" position="0 0.8 -5" align="center" color="red" scale="1.5 1.5 1.5"></a-text>
      </a-entity>
      
      <!-- [視覚化用] 真南（South）オブジェクト: 座標系テスト用 -->
      <a-entity rotation="0 -180 0">
        <a-sphere position="0 0 -5" radius="0.3" color="royalblue" opacity="0.8"></a-sphere>
        <a-text value="S (South)" position="0 0.8 -5" align="center" color="royalblue" scale="1.5 1.5 1.5"></a-text>
      </a-entity>

      <!-- ====== 虹のコンテナ（対日点） ====== -->
      <a-entity id="rainbow-pivot" visible="false">
        <a-entity position="0 0 -10">
          <a-torus radius="9.6" radius-tubular="0.1" arc="180" color="#FF0000" material="opacity: 0.7; transparent: true"></a-torus>
          <a-torus radius="9.4" radius-tubular="0.1" arc="180" color="#FF7F00" material="opacity: 0.7; transparent: true"></a-torus>
          <a-torus radius="9.2" radius-tubular="0.1" arc="180" color="#FFFF00" material="opacity: 0.7; transparent: true"></a-torus>
          <a-torus radius="9.0" radius-tubular="0.1" arc="180" color="#00FF00" material="opacity: 0.7; transparent: true"></a-torus>
          <a-torus radius="8.8" radius-tubular="0.1" arc="180" color="#0000FF" material="opacity: 0.7; transparent: true"></a-torus>
          <a-torus radius="8.6" radius-tubular="0.1" arc="180" color="#4B0082" material="opacity: 0.7; transparent: true"></a-torus>
          <a-torus radius="8.4" radius-tubular="0.1" arc="180" color="#9400D3" material="opacity: 0.7; transparent: true"></a-torus>
        </a-entity>
      </a-entity>

    </a-entity>

    <a-camera position="0 1.6 0" look-controls></a-camera>

  </a-scene>

  <!-- 制御スクリプト -->
    <script>
    const startBtn = document.getElementById('start-btn');
    const startScreen = document.getElementById('start-screen');
    const dbgLoc = document.getElementById('dbg-loc');
    const dbgCompass = document.getElementById('dbg-compass');
    const dbgInitial = document.getElementById('dbg-initial');
    const dbgSunAz = document.getElementById('dbg-sun-az');
    const dbgSunAlt = document.getElementById('dbg-sun-alt');
    const dbgRbAz = document.getElementById('dbg-rb-az');
    const dbgRbAlt = document.getElementById('dbg-rb-alt');
    const statusMsg = document.getElementById('status-msg');
    
    const worldContainer = document.getElementById('world-container');
    const rainbowPivot = document.getElementById('rainbow-pivot');

    let hasLocation = false;
    let userLat = 0, userLng = 0;
    
    let hasCompass = false;
    let initialHeading = 0;

    startBtn.addEventListener('click', async () => {
      // iOS13以降のDeviceOrientation許可ダイアログ対応
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== 'granted') {
            alert('センサーへのアクセスが拒否されました。設定を確認してください。');
            return;
          }
        } catch (error) {
          console.error('Permission Request Error:', error);
        }
      }
      startScreen.style.display = 'none';
      initApp();
    });

    function initApp() {
      // 1. デバイスの方位（コンパス）イベント登録
      // iOS用 (webkitCompassHeading: 真北基準・時計回り)
      window.addEventListener('deviceorientation', (e) => {
        if (e.webkitCompassHeading !== undefined) {
          handleHeading(e.webkitCompassHeading);
        }
      });
      // Android用 (deviceorientationabsolute/alpha: 北0度・反時計回り)
      window.addEventListener('deviceorientationabsolute', (e) => {
        if (e.alpha !== null) {
          // Androidのalphaは反時計回りのため、360から引いて時計回り(0-360)に統一する
          handleHeading(360 - e.alpha);
        }
      });

      function handleHeading(heading) {
        if (heading === null) return;
        dbgCompass.innerText = heading.toFixed(1);
        
        if (!hasCompass) {
          // 初回起動時にデバイスが向いている方角を「初期方位(オフセット)」として記録
          initialHeading = heading;
          dbgInitial.innerText = initialHeading.toFixed(1);
          hasCompass = true;
          
          // ワールドコンテナ自体を初期方位分だけ回転させることで、
          // 仮想空間のZ-軸（標準）が「起動時に向いていた方向」ではなく「真北」を向くように補正する。
          // A-FrameのY軸回転は反時計回りが正なので、初期方角(時計回り)を正の値として渡すと相殺されて真北が0度になる。
          worldContainer.setAttribute('rotation', `0 ${initialHeading} 0`);
          
          if (hasLocation) updateRainbow(); // GPS取得済みなら即座に虹を配置
        }
      }

      // 2. 位置情報の取得開始
      if (!navigator.geolocation) {
        statusMsg.innerText = "このブラウザでは位置情報がサポートされていません。";
        return;
      }
      
      statusMsg.innerText = "現在地を取得しています...";

      navigator.geolocation.getCurrentPosition(
        (position) => {
          userLat = position.coords.latitude;
          userLng = position.coords.longitude;
          hasLocation = true;
          
          dbgLoc.innerText = `${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
          
          // 初回計算
          updateRainbow();
          // 30秒ごとに再計算（天体の動きに合わせて）
          setInterval(updateRainbow, 30000);
        },
        (error) => {
          statusMsg.innerText = "位置情報の取得に失敗しました: " + error.message;
        },
        { enableHighAccuracy: true }
      );
    }

    // 3. SunCalcを使って太陽・虹の座標を計算・配置する
    function updateRainbow() {
      if (!hasLocation || !hasCompass) return;
      
      const now = new Date();
      // SunCalcで計算される方位(azimuth)は「南を0度とするラジアン値」
      const sunPos = SunCalc.getPosition(now, userLat, userLng);
      
      // (1) 太陽の高度（ラジアン → 度数法）
      const sunAltitudeDeg = sunPos.altitude * 180 / Math.PI;
      
      // (2) 太陽の方位変換（南0度・ラジアン → 真北0度・時計回りの度数法へ）
      // ラジアンを度数法にし、+180度して南基準から北基準へ変換。360で割った余りを取る。
      const sunAzimuthDeg = ((sunPos.azimuth * 180 / Math.PI) + 180 + 360) % 360;

      // デバッグパネルへ出力
      dbgSunAlt.innerText = sunAltitudeDeg.toFixed(1);
      dbgSunAz.innerText = sunAzimuthDeg.toFixed(1);

      // (3) 対日点（虹の中心点）の計算
      // 方位：太陽の真逆 (+180度)
      const rainbowAzimuthDeg = (sunAzimuthDeg + 180) % 360;
      // 高度：太陽の高度の符号反転
      const rainbowAltitudeDeg = -sunAltitudeDeg;

      // デバッグパネルへ出力
      dbgRbAlt.innerText = rainbowAltitudeDeg.toFixed(1);
      dbgRbAz.innerText = rainbowAzimuthDeg.toFixed(1);

      // (4) 虹の表示・非表示の判定
      if (sunAltitudeDeg >= 42) {
        statusMsg.innerText = "太陽高度が42度以上のため、虹は地平線の下です";
        rainbowPivot.setAttribute('visible', 'false');
      } else if (sunAltitudeDeg < 0) {
        statusMsg.innerText = "日没後のため太陽の虹は見えません（月虹モード未実装）";
        rainbowPivot.setAttribute('visible', 'false');
      } else {
        statusMsg.innerText = "見回して、太陽の反対側（対日点）のリングを探してください";
        rainbowPivot.setAttribute('visible', 'true');
        
        // (5) 虹エンティティの配置（回転による移動）
        // world-container(親)がすでに真北を向くように補正されているため、
        // A-Frameの座標系に沿って、X軸(ピッチ/高度)とY軸(ヨー/方位)をストレートに適用すればよい。
        // A-FrameのY軸は反時計回りが正なので、方位角(時計回り)を反転してマイナス値にする。
        const rotX = rainbowAltitudeDeg;
        const rotY = -rainbowAzimuthDeg;
        
        rainbowPivot.setAttribute('rotation', `${rotX} ${rotY} 0`);
      }
    }
  </script>
